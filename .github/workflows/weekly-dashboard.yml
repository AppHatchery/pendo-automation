name: Weekly Pendo Dashboard

on:
  schedule:
    # Every Monday at 03:00 UTC = Sunday ~10 PM ET / ~11 PM CT
    - cron: '0 3 * * 1'
  workflow_dispatch:   # also allows manual "Run workflow" from GitHub UI

permissions:
  contents: write      # needed to commit dashboard.html back to the repo

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # NOTE: dashboard.html is generated locally by the Claude scheduled task
      # (which uses the Pendo MCP — no API key required) and committed here.
      # This workflow just commits any changes pushed by that process.
      # If you ever upgrade to a Pendo plan with API access, uncomment the env
      # block below and this step will generate the file directly.
      #
      # - name: Generate dashboard (REST API mode — requires Pendo premium)
      #   env:
      #     PENDO_KEY_TRIAL_CONNECTION:          ${{ secrets.PENDO_KEY_TRIAL_CONNECTION }}
      #     PENDO_KEY_MEALPLANR:                 ${{ secrets.PENDO_KEY_MEALPLANR }}
      #     PENDO_KEY_HOMETOWN:                  ${{ secrets.PENDO_KEY_HOMETOWN }}
      #     PENDO_KEY_TB_GUIDE:                  ${{ secrets.PENDO_KEY_TB_GUIDE }}
      #     PENDO_KEY_APPHATCHERY:               ${{ secrets.PENDO_KEY_APPHATCHERY }}
      #     PENDO_KEY_LEP:                       ${{ secrets.PENDO_KEY_LEP }}
      #     PENDO_KEY_APPHATCHERY_TONSILLECTOMY: ${{ secrets.PENDO_KEY_APPHATCHERY_TONSILLECTOMY }}
      #     PENDO_KEY_TYPEU:                     ${{ secrets.PENDO_KEY_TYPEU }}
      #   run: python generate_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          # Only commit if dashboard.html actually changed
          git diff --staged --quiet \
            || git commit -m "chore: weekly dashboard update $(date -u '+%Y-%m-%d')"
          git push
